<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Braulin?</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f4f8;
      font-family: Arial, sans-serif;
    }

    h1 {
      font-size: 2rem;
      color: #333;
      margin-bottom: 2rem;
    }

    .buttons {
      display: flex;
      gap: 2rem;
    }

    button {
      padding: 1rem 3rem;
      font-size: 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .si {
      background-color: #4caf50;
      color: white;
    }

    .no {
      background-color: #f44336;
      color: white;
    }

    #respuesta {
      margin-top: 2rem;
      font-size: 1.5rem;
      font-weight: bold;
      color: #444;
    }

    #flotante {
      position: fixed;
      font-size: 3rem;
      font-weight: bold;
      color: #e63946;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <h1>Eras un Braulin?</h1>
  <div class="buttons">
    <button class="si" onclick="responder('Si')">Si</button>
    <button class="no" onclick="responder('No')">No</button>
  </div>
  <p id="respuesta"></p>

  <div id="flotante">444</div>

  <script>
    function responder(opcion) {
      const msg = opcion === 'Si'
        ? 'Confirmado, eres un Braulin!'
        : 'No eres un Braulin... o si?';
      document.getElementById('respuesta').textContent = msg;
    }

    const el = document.getElementById('flotante');
    let x = Math.random() * (window.innerWidth - 80);
    let y = Math.random() * (window.innerHeight - 60);
    let dx = 2.5;
    let dy = 2;

    const colores = ['#e63946','#2196f3','#4caf50','#ff9800','#9c27b0','#00bcd4','#ff5722','#ffeb3b'];
    let colorIndex = 0;

    function cambiarColor() {
      colorIndex = (colorIndex + 1) % colores.length;
      el.style.color = colores[colorIndex];
    }

    function animar() {
      const w = el.offsetWidth;
      const h = el.offsetHeight;

      x += dx;
      y += dy;

      if (x + w >= window.innerWidth || x <= 0) { dx = -dx; cambiarColor(); }
      if (y + h >= window.innerHeight || y <= 0) { dy = -dy; cambiarColor(); }

      el.style.left = x + 'px';
      el.style.top = y + 'px';

      requestAnimationFrame(animar);
    }

    animar();
  </script>
</body>
</html>
